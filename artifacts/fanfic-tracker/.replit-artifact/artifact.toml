kind = "web"
previewPath = "/"
title = "Fanfic Tracker"
version = "1.0.0"
id = "artifacts/fanfic-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23411

[services.development]
run = "pnpm --filter @workspace/fanfic-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fanfic-tracker", "run", "build" ]
publicDir = "artifacts/fanfic-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23411"
BASE_PATH = "/"
